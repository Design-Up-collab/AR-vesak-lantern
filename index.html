<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="margin:0; background:#000;">

    <!-- 🎵 Background Music -->
    <audio id="bgmusic" loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <!-- ▶ Music button (safe for mobile autoplay rules) -->
    <button onclick="document.getElementById('bgmusic').play()" style="
  position:fixed;
  top:15px;
  left:15px;
  z-index:10;
  padding:10px 15px;
  background:white;
  border:none;
  border-radius:8px;
  font-weight:bold;">
        ▶ Music
    </button>

    <model-viewer id="arViewer" src="model.glb" ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
        camera-controls auto-rotate rotation-per-second="8deg" style="width:100%; height:100vh;" loading="eager">

        <button id="arButton" slot="ar-button" style="
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    background:#FF6B6B;
    color:white;
    border-radius:8px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    z-index:100;
    display:none;">
            👁 View in AR
        </button>

    </model-viewer>

    <script>
        const viewer = document.getElementById('arViewer');
        const arButton = document.getElementById('arButton');

        // Log when model loads
        viewer.addEventListener('load', () => {
            console.log('✅ Model loaded successfully');
        });

        // Log any errors
        viewer.addEventListener('error', (e) => {
            console.error('❌ Model failed to load:', e);
        });

        // Show AR button only if AR is supported
        viewer.addEventListener('ar-status', (event) => {
            console.log('AR Status:', event.detail.status);
            if (event.detail.canActivate) {
                arButton.style.display = 'block';
            }
        });

        // Handle AR button click
        arButton.addEventListener('click', async () => {
            console.log('AR button clicked');
            try {
                await viewer.activateAR();
                console.log('✅ AR activated');
            } catch (error) {
                console.error('❌ AR activation failed:', error);
                alert('AR is not supported on this device or browser. Try:\n- Chrome on Android\n- Safari on iOS');
            }
        });

        // Check initial AR support
        console.log('AR supported:', viewer.canActivateAR);
        if (viewer.canActivateAR) {
            arButton.style.display = 'block';
        }
    </script>

</body>

</html>
